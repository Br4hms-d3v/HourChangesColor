name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permissions for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Spotless Check
        run: ./gradlew spotlessCheck

      - name: Build
        run: ./gradlew build --no-daemon

